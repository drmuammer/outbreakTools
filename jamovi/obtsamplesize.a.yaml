name: obtsamplesize
title: Sample Size Calculator
menuGroup: Outbreak Tools
menuSubgroup: 4. Study Design
version: '1.0.0'
jas: '1.2'

options:
    - name: data
      type: Data
    - name: studyType
      title: Study Design
      type: List
      options:
          - {title: Cohort Study,          name: cohort}
          - {title: Case-Control Study,    name: casecontrol}
          - {title: Cross-Sectional Study, name: crosssectional}
      default: cohort
    - name: p0
      title: Baseline Risk / Prevalence in unexposed (%)
      type: Number
      min: 0.1
      max: 99.9
      default: 20
    - name: effect
      title: Expected RR (cohort) or OR (case-control)
      type: Number
      min: 0.01
      max: 20
      default: 2.0
    - name: alpha
      title: Type I Error (alpha)
      type: List
      options:
          - {title: 0.05 (two-sided), name: '0.05'}
          - {title: 0.01 (two-sided), name: '0.01'}
          - {title: 0.10 (two-sided), name: '0.10'}
      default: '0.05'
    - name: power
      title: Statistical Power (1-beta)
      type: List
      options:
          - {title: 80%, name: '0.80'}
          - {title: 90%, name: '0.90'}
          - {title: 95%, name: '0.95'}
      default: '0.80'
    - name: ratio
      title: Control:Case ratio
      type: Number
      min: 1
      max: 5
      default: 1