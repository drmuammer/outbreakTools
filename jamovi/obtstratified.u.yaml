    persistentItems: false
    stretchFactor: 1
    children:
      - type: TargetLayoutBox
        label: Stratification Variable
        children:
          - type: VariablesListBox
            name: stratVar
            maxItemCount: 1
            isTarget: true
  - type: LayoutBox
    margin: large
