title: Epidemic Curve
name: obtepicurve
jus: '3.0'
stage: 0
compilerMode: aggressive
children:
  - type: VariableSupplier
    persistentItems: false
    stretchFactor: 1
    children:
      - type: TargetLayoutBox
        label: Date of Symptom Onset
        children:
          - type: VariablesListBox
            name: dateVar
            maxItemCount: 1
            isTarget: true
      - type: TargetLayoutBox
        label: Grouping Variable (optional)
        children:
          - type: VariablesListBox
            name: groupVar
            maxItemCount: 1
            isTarget: true
  - type: LayoutBox
    margin: large
    children:
      - type: ComboBox
        name: timeUnit
  - type: LayoutBox
    margin: large
    children:
      - type: ComboBox
        name: dateFormat
  - type: LayoutBox
    margin: large
    children:
      - type: TextBox
        name: plotTitle
        format: string
  - type: LayoutBox
    margin: large
    children:
      - type: TextBox
        name: xLabel
        format: string
  - type: LayoutBox
    margin: large
    children:
      - type: TextBox
        name: yLabel
        format: string
  - type: LayoutBox
    margin: large
    children:
      - type: ComboBox
        name: fillColour
  - type: LayoutBox
    margin: large
    children:
      - type: CheckBox
        name: showTable
      - type: CheckBox
        name: showNLabel
      - type: CheckBox
        name: showPeakLine
