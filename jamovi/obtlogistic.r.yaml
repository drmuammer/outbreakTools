name: obtlogistic
title: Logistic Regression
jrs: '1.1'

items:
    - name: univarTable
      title: Univariable Analysis (crude OR)
      type: Table
      columns:
          - {name: variable, title: Variable,  type: text}
          - {name: level,    title: Level,     type: text}
          - {name: or,       title: 'Crude OR',type: number, format: zto}
          - {name: ci_low,   title: CI Low,    type: number, format: zto}
          - {name: ci_high,  title: CI High,   type: number, format: zto}
          - {name: p_value,  title: p-value,   type: number, format: 'zto,pvalue'}
          - {name: screened, title: 'In MV model', type: text}
    - name: multivarTable
      title: Multivariable Analysis (adjusted OR)
      type: Table
      columns:
          - {name: variable, title: Variable,   type: text}
          - {name: or,       title: 'Adj. OR',  type: number, format: zto}
          - {name: ci_low,   title: CI Low,     type: number, format: zto}
          - {name: ci_high,  title: CI High,    type: number, format: zto}
          - {name: p_value,  title: p-value,    type: number, format: 'zto,pvalue'}
    - name: fitTable
      title: Model Fit Statistics
      type: Table
      visible: (showFit)
      columns:
          - {name: metric, title: Statistic, type: text}
          - {name: value,  title: Value,     type: text}
    - name: forestPlot
      title: Adjusted OR Forest Plot
      type: Image
      width: 560
      height: 380
      renderFun: .plotForest
      visible: (showForest)
    - name: logisticNote
      title: Methods & References
      type: Html
      visible: always