title: Cohort Study — Risk Analysis
name: obtcohort
jus: '3.0'
stage: 0
compilerMode: aggressive
children:
  - type: VariableSupplier
    persistentItems: false
    stretchFactor: 1
    children:
      - type: TargetLayoutBox
        label: Exposure Variable
        children:
          - type: VariablesListBox
            name: exposureVar
            maxItemCount: 1
            isTarget: true
  - type: LayoutBox
    margin: large
    children:
      - type: TextBox
        name: exposedLevel
        format: string
  - type: VariableSupplier
    persistentItems: false
    stretchFactor: 1
    children:
      - type: TargetLayoutBox
        label: Outcome / Case Variable
        children:
          - type: VariablesListBox
            name: outcomeVar
            maxItemCount: 1
            isTarget: true
  - type: LayoutBox
    margin: large
    children:
      - type: TextBox
        name: caseLevel
        format: string
  - type: LayoutBox
    margin: large
    children:
      - type: TextBox
        name: ciLevel
        format: number
  - type: LayoutBox
    margin: large
    children:
      - type: CheckBox
        name: showAR
      - type: CheckBox
        name: showPAR
      - type: CheckBox
        name: showForest
