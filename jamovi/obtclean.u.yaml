title: Data Quality & Linelist Check
name: obtclean
jus: '3.0'
stage: 0
compilerMode: aggressive
children:
  - type: VariableSupplier
    persistentItems: false
    stretchFactor: 1
    children:
      - type: TargetLayoutBox
        label: Unique Case ID Variable
        children:
          - type: VariablesListBox
            name: idVar
            maxItemCount: 1
            isTarget: true
      - type: TargetLayoutBox
        label: Date Variables to Audit
        children:
          - type: VariablesListBox
            name: dateVars
            isTarget: true
  - type: LayoutBox
    margin: large
    children:
      - type: ComboBox
        name: dateFormat
  - type: LayoutBox
    margin: large
    children:
      - type: TextBox
        name: refStartDate
        format: string
  - type: VariableSupplier
    persistentItems: false
    stretchFactor: 1
    children:
      - type: TargetLayoutBox
        label: Categorical Variables to Audit
        children:
          - type: VariablesListBox
            name: catVars
            isTarget: true
      - type: TargetLayoutBox
        label: Numeric Variables to Audit
        children:
          - type: VariablesListBox
            name: numVars
            isTarget: true
      - type: TargetLayoutBox
        label: Age Variable (for range check)
        children:
          - type: VariablesListBox
            name: ageVar
            maxItemCount: 1
            isTarget: true
  - type: LayoutBox
    margin: large
    children:
      - type: TextBox
        name: ageMin
        format: number
  - type: LayoutBox
    margin: large
    children:
      - type: TextBox
        name: ageMax
        format: number
  - type: LayoutBox
    margin: large
    children:
      - type: TextBox
        name: missingThreshold
        format: number
  - type: LayoutBox
    margin: large
    children:
      - type: CheckBox
        name: showDuplicates
      - type: CheckBox
        name: showMissing
      - type: CheckBox
        name: showCatIssues

  - type: CollapseBox
    label: Smart Data Cleaning Assistant (OpenRefine-style)
    collapsed: false
    children:
      - type: LayoutBox
        margin: large
        children:
          - type: CheckBox
            name: showClustering
          - type: LayoutBox
            margin: small
            children:
              - type: Label
                label: Clustering method
              - type: ComboBox
                name: clusterMethod
          - type: CheckBox
            name: showDateDiversity
          - type: CheckBox
            name: showRCode
