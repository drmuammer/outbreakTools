title: Logistic Regression
name: obtlogistic
jus: '3.0'
stage: 0
compilerMode: aggressive
children:
  - type: VariableSupplier
    persistentItems: false
    stretchFactor: 1
    children:
      - type: TargetLayoutBox
        label: Outcome Variable (binary)
        children:
          - type: VariablesListBox
            name: outcomeVar
            maxItemCount: 1
            isTarget: true
  - type: LayoutBox
    margin: large
    children:
      - type: TextBox
        name: caseLevel
        format: string
  - type: VariableSupplier
    persistentItems: false
    stretchFactor: 1
    children:
      - type: TargetLayoutBox
        label: Exposure / Predictor Variables
        children:
          - type: VariablesListBox
            name: exposures
            isTarget: true
  - type: LayoutBox
    margin: large
    children:
      - type: CheckBox
        name: autoScreen
  - type: LayoutBox
    margin: large
    children:
      - type: TextBox
        name: ciLevel
        format: number
  - type: LayoutBox
    margin: large
    children:
      - type: CheckBox
        name: showForest
      - type: CheckBox
        name: showFit
