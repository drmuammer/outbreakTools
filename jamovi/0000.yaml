  - title: Data Quality & Linelist Check
    name: obtclean
    ns: outbreakTools
    category: analyses
    menuGroup: Outbreak Tools
    menuSubgroup: 1. Data Management
    menuTitle: Data Quality & Linelist Check
    description: >
      Automated outbreak linelist quality audit. Detects duplicate records,
      missing data patterns, impossible/future dates, out-of-range numeric
      values, and inconsistent categorical coding. Generates a structured
      cleaning report for field documentation.
  - title: Cohort Study — Risk Analysis
    name: obtcohort
    ns: outbreakTools
    category: analyses
    menuGroup: Outbreak Tools
    menuSubgroup: 3. Analytic Epidemiology
    menuTitle: Cohort Study — Risk Analysis
    description: >
      2×2 table analysis for cohort and cross-sectional outbreak designs.
      Calculates Risk Ratio (Relative Risk), Attributable Risk, Population
      Attributable Risk with 95% confidence intervals and chi-square tests.
      Reference: Rothman & Greenland (2008); CDC Field Epi Manual (2012).
  - title: Descriptive Epidemiology
    name: obtdescriptive
    ns: outbreakTools
    category: analyses
    menuGroup: Outbreak Tools
    menuSubgroup: 2. Descriptive Analysis
    menuTitle: Descriptive Epidemiology
  - title: Epidemic Curve
    name: obtepicurve
    ns: outbreakTools
    category: analyses
    menuGroup: Outbreak Tools
    menuSubgroup: 2. Descriptive Analysis
    menuTitle: Epidemic Curve
    description: >
      Generates publication-quality epidemic curves (histograms of case counts
      over time) for outbreak investigation. Supports ISO epi-week, day, and
      month intervals. Includes optional case classification grouping and
      case-count table.
  - title: Logistic Regression
