type: R
description: >-
  A comprehensive outbreak analysis toolkit for jamovi developed for Field
  Epidemiology Training Programme (FETP) practitioners. Provides standardised
  tools for outbreak investigation workflow: data quality auditing, descriptive
  epidemiology, analytical methods (cohort, case-control, stratified, logistic),
  and sample size planning.
analyses:
  - title: Data Quality & Linelist Check
    name: obtclean
    ns: outbreakTools
    category: analyses
    menuGroup: Outbreak Tools
    menuSubgroup: 01. Data Management
    menuTitle: Data Quality & Linelist Check
    description: >
      Automated outbreak linelist quality audit with OpenRefine-style cluster
      detection. Detects duplicate records, missing data patterns,
      impossible/future dates, out-of-range numeric values, inconsistent
      categorical coding, and produces copy-paste R cleaning recipes.

  - title: Descriptive Epidemiology
    name: obtdescriptive
    ns: outbreakTools
    category: analyses
    menuGroup: Outbreak Tools
    menuSubgroup: 02. Descriptive Analysis
    menuTitle: Descriptive Epidemiology

  - title: Epidemic Curve
    name: obtepicurve
    ns: outbreakTools
    category: analyses
    menuGroup: Outbreak Tools
    menuSubgroup: 02. Descriptive Analysis
    menuTitle: Epidemic Curve
    description: >
      Generates publication-quality epidemic curves (histograms of case counts
      over time) for outbreak investigation. Supports ISO epi-week, day, and
      month intervals.

  - title: Cohort Study - Risk Analysis
    name: obtcohort
    ns: outbreakTools
    category: analyses
    menuGroup: Outbreak Tools
    menuSubgroup: 03. Analytic Epidemiology
    menuTitle: Cohort Study - Risk Analysis
    description: >
      2x2 table analysis for cohort and cross-sectional outbreak designs.
      Calculates Risk Ratio, Attributable Risk, Population Attributable Risk
      with 95% confidence intervals and chi-square tests.

  - title: Case-Control Study - Odds Ratio
    name: obtcasecontrol
