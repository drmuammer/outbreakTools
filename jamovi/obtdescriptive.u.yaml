title: Descriptive Epidemiology
name: obtdescriptive
jus: '3.0'
stage: 0
compilerMode: aggressive
children:
  - type: VariableSupplier
    persistentItems: false
    stretchFactor: 1
    children:
      - type: TargetLayoutBox
        label: Case Status Variable
        children:
          - type: VariablesListBox
            name: caseVar
            maxItemCount: 1
            isTarget: true
  - type: LayoutBox
    margin: large
    children:
      - type: TextBox
        name: caseLevel
        format: string
  - type: VariableSupplier
    persistentItems: false
    stretchFactor: 1
    children:
      - type: TargetLayoutBox
        label: Person / Place Variables
        children:
          - type: VariablesListBox
            name: personVars
            isTarget: true
      - type: TargetLayoutBox
        label: Age Variable (continuous)
        children:
          - type: VariablesListBox
            name: ageVar
            maxItemCount: 1
            isTarget: true
  - type: LayoutBox
    margin: large
    children:
      - type: CheckBox
        name: showAR
  - type: LayoutBox
    margin: large
    children:
      - type: ComboBox
        name: ciMethod
  - type: LayoutBox
    margin: large
    children:
      - type: TextBox
        name: ciLevel
        format: number
  - type: LayoutBox
    margin: large
    children:
      - type: CheckBox
        name: showMissing
